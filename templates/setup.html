<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>设置密码 - PFPanel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .setup-container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }
        
        .setup-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            animation: fadeInUp 0.6s ease-out;
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .setup-header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .setup-header h1 {
            color: #ffffff;
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 10px;
        }
        
        .setup-header p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
        }
        
        .setup-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        
        .setup-icon i {
            font-size: 40px;
            color: white;
        }
        
        .form-floating {
            margin-bottom: 20px;
        }
        
        .form-floating > .form-control {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            font-size: 15px;
            padding: 1rem 1rem;
        }
        
        .form-floating > .form-control:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
            color: white;
        }
        
        .form-floating > label {
            color: rgba(255, 255, 255, 0.6);
            padding: 1rem 1rem;
        }
        
        .form-floating > .form-control:focus ~ label,
        .form-floating > .form-control:not(:placeholder-shown) ~ label {
            color: #667eea;
        }
        
        .btn-setup {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        
        .btn-setup:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }
        
        .btn-setup:active {
            transform: translateY(0);
        }
        
        .alert-custom {
            background: rgba(235, 51, 73, 0.2);
            border: 1px solid rgba(235, 51, 73, 0.3);
            color: #f45c43;
            border-radius: 12px;
            padding: 12px 16px;
            margin-bottom: 20px;
            font-size: 14px;
        }
        
        .password-tips {
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
            margin-top: 15px;
            text-align: center;
        }
        
        .lang-switcher-setup {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 1001;
        }
        
        .lang-btn-setup {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: rgba(255, 255, 255, 0.7);
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-left: 5px;
        }
        
        .lang-btn-setup:hover {
            background: rgba(255, 255, 255, 0.2);
            color: white;
        }
        
        .lang-btn-setup.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: transparent;
        }
    </style>
</head>
<body>
    <div class="lang-switcher-setup">
        <button class="lang-btn-setup active" onclick="switchSetupLang('zh')">🇨🇳 中文</button>
        <button class="lang-btn-setup" onclick="switchSetupLang('en')">🇺🇸 EN</button>
    </div>
    
    <div class="setup-container">
        <div class="setup-card">
            <div class="setup-header">
                <div class="setup-icon">
                    <i class="bi bi-shield-lock"></i>
                </div>
                <h1 data-i18n="setup.title">设置管理员密码</h1>
                <p data-i18n="setup.subtitle">首次使用请创建密码</p>
            </div>
            
            {% if error %}
            <div class="alert-custom">
                <i class="bi bi-exclamation-circle me-2"></i>{{ error }}
            </div>
            {% endif %}
            
            <form method="POST" action="/setup">
                <div class="form-floating">
                    <input type="password" class="form-control" id="password" name="password" placeholder="密码" required minlength="6">
                    <label for="password"><i class="bi bi-lock me-2"></i><span data-i18n="setup.password">密码</span></label>
                </div>
                <div class="form-floating">
                    <input type="password" class="form-control" id="confirm_password" name="confirm_password" placeholder="确认密码" required minlength="6">
                    <label for="confirm_password"><i class="bi bi-lock-fill me-2"></i><span data-i18n="setup.confirmPassword">确认密码</span></label>
                </div>
                <button type="submit" class="btn btn-setup">
                    <i class="bi bi-check-circle me-2"></i><span data-i18n="setup.submit">创建密码</span>
                </button>
            </form>
            
            <div class="password-tips" data-i18n="setup.tips">
                <i class="bi bi-info-circle me-1"></i>密码长度至少6位，请牢记密码
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const setupTranslations = {
            zh: {
                'setup.title': '设置管理员密码',
                'setup.subtitle': '首次使用请创建密码',
                'setup.password': '密码',
                'setup.confirmPassword': '确认密码',
                'setup.submit': '创建密码',
                'setup.tips': '密码长度至少6位，请牢记密码'
            },
            en: {
                'setup.title': 'Set Admin Password',
                'setup.subtitle': 'Create a password for first use',
                'setup.password': 'Password',
                'setup.confirmPassword': 'Confirm Password',
                'setup.submit': 'Create Password',
                'setup.tips': 'Password must be at least 6 characters, please remember it'
            }
        };
        
        let currentSetupLang = localStorage.getItem('lang') || 'zh';
        
        function switchSetupLang(lang) {
            currentSetupLang = lang;
            localStorage.setItem('lang', lang);
            
            document.querySelectorAll('.lang-btn-setup').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            applySetupTranslations();
        }
        
        function applySetupTranslations() {
            document.querySelectorAll('[data-i18n]').forEach(element => {
                const key = element.getAttribute('data-i18n');
                if (setupTranslations[currentSetupLang][key]) {
                    element.textContent = setupTranslations[currentSetupLang][key];
                }
            });
        }
        
        document.addEventListener('DOMContentLoaded', function() {
            applySetupTranslations();
            
            document.querySelectorAll('.lang-btn-setup').forEach(btn => {
                btn.classList.remove('active');
                if ((currentSetupLang === 'zh' && btn.textContent.includes('中文')) || 
                    (currentSetupLang === 'en' && btn.textContent.includes('EN'))) {
                    btn.classList.add('active');
                }
            });
        });
    </script>
</body>
</html>
