name: Build and Release Executable

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions: write-all

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Create executable with PyInstaller
        run: pyinstaller pfpanel.spec

      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v1.6.0-${{ github.run_number }}
          release_name: PFPanel v1.6.0 (Build ${{ github.run_number }})
          body: |
            🎉 PFPanel v1.6.0 自动构建版本

            ## 更新内容
            - 全新 UI 设计，现代化界面
            - 支持中英文切换
            - 配置文件迁移至游戏目录
            - 优化文件管理功能
            - 修复已知问题

            感谢使用 PFPanel！如有问题请提交 Issue。
          draft: false
          prerelease: false

      - name: Upload executable to Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./dist/pfpanel
          asset_name: pfpanel-linux-x64
          asset_content_type: application/octet-stream
